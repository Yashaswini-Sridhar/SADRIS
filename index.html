<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SADRIS — Smart Automated Disaster Response & Intelligence System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #0f1628;
    --bg3: #151e35;
    --panel: #1a2540;
    --border: rgba(99,179,237,0.15);
    --border2: rgba(99,179,237,0.3);
    --text: #e8edf5;
    --text2: #8ba3c4;
    --text3: #4a6080;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --orange: #f97316;
    --purple: #8b5cf6;
    --teal: #14b8a6;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); overflow-x: hidden; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Layout */
  .app { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: 56px 1fr; min-height: 100vh; }
  .topbar { grid-column: 1/-1; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 10; }
  .sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 16px 0; overflow-y: auto; }
  .main { overflow-y: auto; padding: 24px; background: var(--bg); }

  /* Topbar */
  .logo { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent2); letter-spacing: 2px; }
  .logo span { color: var(--text3); }
  .status-bar { display: flex; gap: 16px; margin-left: auto; align-items: center; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-txt { font-family: var(--mono); font-size: 10px; color: var(--text2); letter-spacing: 1px; }
  .time-display { font-family: var(--mono); font-size: 11px; color: var(--accent2); }
  .alert-badge { background: var(--red); color: white; font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700; animation: pulse 1.5s infinite; }

  /* Sidebar */
  .nav-section { padding: 8px 16px 4px; font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; transition: all 0.15s; font-size: 13px; color: var(--text2); border-left: 2px solid transparent; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--bg3); color: var(--accent2); border-left-color: var(--accent); }
  .nav-icon { font-size: 16px; width: 18px; text-align: center; }
  .nav-badge { margin-left: auto; font-family: var(--mono); font-size: 9px; padding: 1px 6px; border-radius: 8px; }
  .nav-badge.red { background: rgba(239,68,68,0.2); color: var(--red); }
  .nav-badge.green { background: rgba(16,185,129,0.2); color: var(--green); }

  /* Cards */
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .card-sm { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 14px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-family: var(--mono); font-size: 11px; color: var(--text2); letter-spacing: 1.5px; text-transform: uppercase; }
  .card-sub { font-size: 12px; color: var(--text3); }

  /* Grid layouts */
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 20px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; margin-bottom: 20px; }
  .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }

  /* Metric tiles */
  .metric { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
  .metric-label { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
  .metric-value { font-family: var(--mono); font-size: 22px; font-weight: 700; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .metric-delta { font-size: 11px; margin-top: 4px; }
  .delta-up { color: var(--red); }
  .delta-down { color: var(--green); }

  /* Buttons */
  .btn { font-family: var(--mono); font-size: 11px; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: all 0.15s; border: 1px solid; letter-spacing: 0.5px; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-outline { background: transparent; border-color: var(--border2); color: var(--text2); }
  .btn-outline:hover { background: var(--bg3); color: var(--text); }
  .btn-danger { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: var(--red); }
  .btn-success { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.4); color: var(--green); }
  .btn-sm { padding: 5px 10px; font-size: 10px; }

  /* Badges/Tags */
  .badge { font-family: var(--mono); font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 700; letter-spacing: 0.5px; }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .badge-green { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .badge-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
  .badge-blue { background: rgba(59,130,246,0.15); color: var(--accent2); border: 1px solid rgba(59,130,246,0.3); }
  .badge-purple { background: rgba(139,92,246,0.15); color: var(--purple); border: 1px solid rgba(139,92,246,0.3); }
  .badge-teal { background: rgba(20,184,166,0.15); color: var(--teal); border: 1px solid rgba(20,184,166,0.3); }

  /* Severity bars */
  .severity-bar { height: 4px; border-radius: 2px; background: var(--bg); overflow: hidden; }
  .severity-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

  /* Tables */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 1.5px; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); text-transform: uppercase; }
  .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: middle; }
  .data-table tr:hover td { background: var(--bg3); }
  .data-table tr:last-child td { border-bottom: none; }

  /* Progress */
  .progress-bar { background: var(--bg); border-radius: 2px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }

  /* Alert items */
  .alert-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px; border-radius: 6px; margin-bottom: 8px; border: 1px solid; }
  .alert-item.critical { background: rgba(239,68,68,0.05); border-color: rgba(239,68,68,0.2); }
  .alert-item.warning { background: rgba(245,158,11,0.05); border-color: rgba(245,158,11,0.2); }
  .alert-item.info { background: rgba(59,130,246,0.05); border-color: rgba(59,130,246,0.2); }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
  .alert-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .alert-body { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .alert-time { font-family: var(--mono); font-size: 10px; color: var(--text3); }

  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab { font-family: var(--mono); font-size: 11px; padding: 10px 16px; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -1px; letter-spacing: 0.5px; transition: all 0.15s; }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

  /* Page title */
  .page-title { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--text3); margin-bottom: 24px; }

  /* Map placeholder */
  .map-container { background: var(--bg3); border-radius: 6px; position: relative; overflow: hidden; }
  .map-grid { position: absolute; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 30px 30px; }
  .map-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }

  /* Quantum viz */
  .quantum-canvas { border-radius: 6px; background: var(--bg3); }

  /* Inputs */
  input, select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 8px 12px; font-family: var(--sans); font-size: 13px; outline: none; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--bg3); }
  input[type=range] { padding: 0; width: 100%; accent-color: var(--accent); }

  /* Code block */
  .code-block { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 12px; font-family: var(--mono); font-size: 11px; color: var(--teal); overflow-x: auto; }

  /* Gauge */
  .gauge-wrap { text-align: center; }
  .gauge-value { font-family: var(--mono); font-size: 28px; font-weight: 700; }
  .gauge-label { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }

  /* Log stream */
  .log-stream { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 10px; font-family: var(--mono); font-size: 10px; height: 160px; overflow-y: auto; }
  .log-line { color: var(--text3); padding: 2px 0; }
  .log-line span { color: var(--teal); }
  .log-line.warn span { color: var(--yellow); }
  .log-line.err span { color: var(--red); }

  /* Section dividers */
  .section-gap { margin-bottom: 20px; }

  /* Responsive tweaks */
  @media(max-width: 900px) {
    .grid-4 { grid-template-columns: repeat(2,1fr); }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .grid-2-1 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo">SADRIS<span> / </span>CEP</div>
    <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">FACULTY HACKATHON 2026</div>
    <div class="status-bar">
      <span id="alert-badge" class="alert-badge" style="display:none">0 ALERTS</span>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="status-dot"></div>
        <span class="status-txt">LIVE</span>
      </div>
      <div class="time-display" id="clock">--:--:--</div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="nav-section">Monitoring</div>
    <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
      <span class="nav-icon">⬡</span> Overview
    </div>
    <div class="nav-item" onclick="showPage('alerts')" id="nav-alerts">
      <span class="nav-icon">◈</span> Live Alerts
      <span class="nav-badge red" id="alert-nav-count">3</span>
    </div>

    <div class="nav-section" style="margin-top:8px">AI Engine</div>
    <div class="nav-item" onclick="showPage('prediction')" id="nav-prediction">
      <span class="nav-icon">⟁</span> Risk Prediction
    </div>
    <div class="nav-item" onclick="showPage('visualization')" id="nav-visualization">
      <span class="nav-icon">⬡</span> Dashboard viz
    </div>

    <div class="nav-section" style="margin-top:8px">Infrastructure</div>
    <div class="nav-item" onclick="showPage('api')" id="nav-api">
      <span class="nav-icon">⊞</span> Backend APIs
    </div>
    <div class="nav-item" onclick="showPage('security')" id="nav-security">
      <span class="nav-icon">⊡</span> Secure Layer
    </div>

    <div class="nav-section" style="margin-top:8px">Operations</div>
    <div class="nav-item" onclick="showPage('resources')" id="nav-resources">
      <span class="nav-icon">⬟</span> Resources
    </div>
    <div class="nav-item" onclick="showPage('quantum')" id="nav-quantum">
      <span class="nav-icon">◉</span> Quantum-AI
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main" id="main-content">
    <!-- Pages rendered by JS -->
  </main>
</div>

<script>
// ==================== DATA ====================
const RISK_ZONES = [
  { id:'Z001', name:'Dharwad District', type:'Flood', risk:87, trend:'+4', lat:15.4, lon:75.0, pop:1800000 },
  { id:'Z002', name:'Hassan Forest Belt', type:'Wildfire', risk:73, trend:'+12', lat:13.0, lon:76.1, pop:450000 },
  { id:'Z003', name:'Mysuru Industrial', type:'Chemical', risk:61, trend:'-2', lat:12.3, lon:76.6, pop:920000 },
  { id:'Z004', name:'Kodagu Slopes', type:'Landslide', risk:79, trend:'+8', lat:12.4, lon:75.7, pop:230000 },
  { id:'Z005', name:'Bengaluru Metro', type:'Infrastructure', risk:44, trend:'+1', lat:12.97, lon:77.6, pop:12000000 },
  { id:'Z006', name:'Belagavi Reservoir', type:'Flood', risk:55, trend:'-3', lat:15.85, lon:74.5, pop:670000 },
];

const ALERTS = [
  { id:'ALT001', severity:'critical', type:'Flood', location:'Dharwad District', msg:'Water level at 94% capacity. Evacuation imminent for 12,000 residents.', time:'2m ago', ack:false },
  { id:'ALT002', severity:'critical', type:'Landslide', location:'Kodagu Slopes', msg:'Soil moisture index critical. Rapid movement detected on NH-275.', time:'7m ago', ack:false },
  { id:'ALT003', severity:'warning', type:'Wildfire', location:'Hassan Forest', msg:'Fire spread probability 73% in next 6 hours. Wind 34 km/h NE.', time:'15m ago', ack:false },
  { id:'ALT004', severity:'info', type:'Sensor', location:'Mysuru Industrial', msg:'Pressure sensor 7B offline. Redundant system active.', time:'34m ago', ack:true },
  { id:'ALT005', severity:'warning', type:'Infrastructure', location:'Bengaluru Metro', msg:'Bridge stress index elevated on ORR Flyover #3.', time:'1h ago', ack:true },
];

const RESOURCES = [
  { id:'RES001', type:'Ambulance', unit:'Unit Alpha-7', location:'Dharwad', status:'deployed', eta:'8min', crew:2 },
  { id:'RES002', type:'Fire Engine', unit:'Engine Delta-3', location:'Hassan', status:'standby', eta:'—', crew:4 },
  { id:'RES003', type:'Rescue Team', unit:'Team Bravo-12', location:'Kodagu', status:'deployed', eta:'22min', crew:8 },
  { id:'RES004', type:'Medical Van', unit:'MedVan Kappa-1', location:'Mysuru', status:'returning', eta:'45min', crew:3 },
  { id:'RES005', type:'Helicopter', unit:'Heli Sierra-2', location:'Bengaluru Base', status:'ready', eta:'—', crew:3 },
  { id:'RES006', type:'Rescue Team', unit:'Team Charlie-5', location:'Belagavi', status:'standby', eta:'—', crew:6 },
];

const API_ENDPOINTS = [
  { method:'GET', path:'/api/v1/risk/zones', status:200, latency:12, calls:4823 },
  { method:'POST', path:'/api/v1/predict/disaster', status:200, latency:187, calls:912 },
  { method:'GET', path:'/api/v1/alerts/live', status:200, latency:8, calls:18420 },
  { method:'POST', path:'/api/v1/resources/allocate', status:200, latency:94, calls:342 },
  { method:'GET', path:'/api/v1/sensors/stream', status:200, latency:5, calls:89341 },
  { method:'DELETE', path:'/api/v1/alerts/:id/ack', status:200, latency:18, calls:211 },
  { method:'GET', path:'/api/v1/quantum/optimize', status:503, latency:0, calls:7 },
];

// ==================== STATE ====================
let currentPage = 'dashboard';
let alertCount = ALERTS.filter(a=>!a.ack).length;
let simulationRunning = false;
let predictionModel = { accuracy:94.2, lastTrained:'2h ago', epochs:150 };
let logs = [];
let logInterval = null;
let chartInstances = {};

// ==================== UTILS ====================
function riskColor(r) {
  if(r>=80) return 'var(--red)';
  if(r>=60) return 'var(--orange)';
  if(r>=40) return 'var(--yellow)';
  return 'var(--green)';
}
function riskBadge(r) {
  if(r>=80) return '<span class="badge badge-red">CRITICAL</span>';
  if(r>=60) return '<span class="badge badge-yellow">HIGH</span>';
  if(r>=40) return '<span class="badge badge-blue">MEDIUM</span>';
  return '<span class="badge badge-green">LOW</span>';
}
function statusBadge(s) {
  const m = { deployed:'badge-red', standby:'badge-yellow', returning:'badge-blue', ready:'badge-green' };
  return `<span class="badge ${m[s]||'badge-blue'}">${s.toUpperCase()}</span>`;
}
function methodBadge(m) {
  const c = { GET:'badge-green', POST:'badge-blue', DELETE:'badge-red', PUT:'badge-yellow', PATCH:'badge-purple' };
  return `<span class="badge ${c[m]||'badge-blue'}">${m}</span>`;
}
function destroyChart(id) {
  if(chartInstances[id]) { try { chartInstances[id].destroy(); } catch(e){} delete chartInstances[id]; }
}

// ==================== CLOCK ====================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ==================== NAV ====================
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+page);
  if(navEl) navEl.classList.add('active');
  Object.keys(chartInstances).forEach(destroyChart);
  stopLogs();
  renderPage(page);
}

function updateAlertBadge() {
  alertCount = ALERTS.filter(a=>!a.ack).length;
  const badge = document.getElementById('alert-badge');
  const navCount = document.getElementById('alert-nav-count');
  if(alertCount > 0) {
    badge.style.display = 'inline';
    badge.textContent = alertCount + ' ALERT' + (alertCount>1?'S':'');
  } else { badge.style.display = 'none'; }
  if(navCount) navCount.textContent = alertCount;
}

// ==================== PAGES ====================
function renderPage(page) {
  const main = document.getElementById('main-content');
  const renders = { dashboard: renderDashboard, alerts: renderAlerts, prediction: renderPrediction, visualization: renderVisualization, api: renderAPI, security: renderSecurity, resources: renderResources, quantum: renderQuantum };
  if(renders[page]) {
    main.innerHTML = '';
    renders[page](main);
  }
}

// ===== DASHBOARD =====
function renderDashboard(c) {
  c.innerHTML = `
    <div class="page-title">System Overview</div>
    <div class="page-sub">Real-time disaster response intelligence — Karnataka region</div>

    <div class="grid-4">
      <div class="metric">
        <div class="metric-label">Active Zones</div>
        <div class="metric-value" style="color:var(--red)">${RISK_ZONES.filter(z=>z.risk>=60).length}</div>
        <div class="metric-sub">of ${RISK_ZONES.length} monitored</div>
      </div>
      <div class="metric">
        <div class="metric-label">Unack Alerts</div>
        <div class="metric-value" style="color:var(--orange)">${ALERTS.filter(a=>!a.ack).length}</div>
        <div class="metric-sub delta-up">↑ 2 new in last hour</div>
      </div>
      <div class="metric">
        <div class="metric-label">Resources Active</div>
        <div class="metric-value" style="color:var(--yellow)">${RESOURCES.filter(r=>r.status==='deployed').length}</div>
        <div class="metric-sub">of ${RESOURCES.length} units</div>
      </div>
      <div class="metric">
        <div class="metric-label">AI Accuracy</div>
        <div class="metric-value" style="color:var(--green)">${predictionModel.accuracy}%</div>
        <div class="metric-sub delta-down">↓ 0.3% from last epoch</div>
      </div>
    </div>

    <div class="grid-2-1">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Risk Zone Map — Karnataka</span>
          <span class="badge badge-blue">LIVE</span>
        </div>
        <div class="map-container" style="height:320px" id="risk-map">
          <div class="map-grid"></div>
          <svg id="map-svg" style="position:absolute;inset:0;width:100%;height:100%;"></svg>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Active Alerts</span></div>
        ${ALERTS.filter(a=>!a.ack).map(a=>`
          <div class="alert-item ${a.severity}">
            <div class="alert-dot" style="background:${a.severity==='critical'?'var(--red)':a.severity==='warning'?'var(--yellow)':'var(--accent)'}"></div>
            <div style="flex:1">
              <div class="alert-title">${a.type} — ${a.location}</div>
              <div class="alert-body">${a.msg}</div>
              <div class="alert-time">${a.time}</div>
            </div>
          </div>`).join('')}
        <button class="btn btn-outline btn-sm" style="width:100%;margin-top:8px" onclick="showPage('alerts')">View all alerts →</button>
      </div>

function drawMapSVG() {
  const svg = document.getElementById('map-svg');
  if(!svg) return;
  const w=svg.clientWidth||600, h=svg.clientHeight||320;
  // Karnataka bounding box approx: lat 11.5-18.5, lon 74-78.5
  const proj = (lat,lon) => {
    const x = ((lon-74)/(78.5-74))*w;
    const y = h - ((lat-11.5)/(18.5-11.5))*h;
    return [x,y];
  };
  let svgContent = '';
  // Draw crosshatch grid lines
  for(let i=0;i<10;i++) {
    const xx = (i/9)*w;
    const yy = (i/9)*h;
    svgContent += `<line x1="${xx}" y1="0" x2="${xx}" y2="${h}" stroke="rgba(99,179,237,0.08)" stroke-width="1"/>`;
    svgContent += `<line x1="0" y1="${yy}" x2="${w}" y2="${yy}" stroke="rgba(99,179,237,0.08)" stroke-width="1"/>`;
  }
  // Draw zones
  RISK_ZONES.forEach(z=>{
    const [x,y] = proj(z.lat,z.lon);
    const r = 8 + (z.risk/100)*14;
    const col = riskColor(z.risk);
    svgContent += `<circle cx="${x}" cy="${y}" r="${r+4}" fill="${col}" opacity="0.1"/>`;
    svgContent += `<circle cx="${x}" cy="${y}" r="${r}" fill="${col}" opacity="0.25"/>`;
    svgContent += `<circle cx="${x}" cy="${y}" r="5" fill="${col}" opacity="0.9"/>`;
    svgContent += `<text x="${x+10}" y="${y+4}" fill="rgba(232,237,245,0.8)" font-size="10" font-family="Space Mono,monospace">${z.name.split(' ')[0]}</text>`;
    svgContent += `<text x="${x+10}" y="${y+15}" fill="${col}" font-size="9" font-family="Space Mono,monospace">${z.risk}%</text>`;
  });
  // Legend
  svgContent += `<rect x="8" y="${h-70}" width="120" height="64" rx="4" fill="rgba(10,14,26,0.8)" stroke="rgba(99,179,237,0.2)" stroke-width="0.5"/>`;
  [['CRITICAL ≥80','var(--red)','#ef4444'],['HIGH ≥60','var(--orange)','#f97316'],['MEDIUM ≥40','var(--yellow)','#f59e0b'],['LOW','var(--green)','#10b981']].forEach(([l,_,hex],i)=>{
    svgContent += `<circle cx="20" cy="${h-57+i*13}" r="4" fill="${hex}" opacity="0.8"/>`;
    svgContent += `<text x="30" y="${h-53+i*13}" fill="rgba(139,163,196,0.9)" font-size="9" font-family="Space Mono,monospace">${l}</text>`;
  });
  svg.innerHTML = svgContent;
}

      </div>
      <div class="alert-body">${a.msg}</div>
    </div>

function ackAlert(id) {
  const alert = ALERTS.find(a=>a.id===id);
  if(alert) { alert.ack = true; updateAlertBadge(); }
  const el = document.getElementById('alert-'+id);
  if(el) el.outerHTML = renderAlertRow(alert);
}

function triggerNewAlert() {
  const types = ['Flood','Earthquake','Fire','Landslide','Chemical'];
  const locs = ['Tumkur District','Chitradurga','Shivamogga','Raichur','Bidar'];
  const msgs = ['Sensor threshold exceeded. Immediate response required.','Unusual seismic activity detected.','Smoke density critical in sector 7.','GPS displacement anomaly detected.'];
  const newAlert = {
    id:'ALT'+Date.now(), severity:'critical',
    type:types[Math.floor(Math.random()*types.length)],
    location:locs[Math.floor(Math.random()*locs.length)],
    msg:msgs[Math.floor(Math.random()*msgs.length)],
    time:'Just now', ack:false
  };
  ALERTS.unshift(newAlert);
  updateAlertBadge();
  const list = document.getElementById('alert-list');
  if(list) list.innerHTML = ALERTS.map(a=>renderAlertRow(a)).join('');
}

function runPrediction() {
  const btn = document.getElementById('pred-btn');
  btn.textContent = '⟳ Running...';
  btn.disabled = true;
  setTimeout(()=>{
    const rainfall = parseInt(document.getElementById('rainfall-slider').value);
    const wind = parseInt(document.getElementById('wind-slider').value);
    const temp = parseInt(document.getElementById('temp-slider').value);
    const zoneId = document.getElementById('pred-zone').value;
    const zone = RISK_ZONES.find(z=>z.id===zoneId);

    let floodP = Math.min(95, (rainfall/3 + zone.risk*0.4 + 20));
    let fireP = Math.min(90, (wind*0.6 + temp*0.8 + 10));
    let landP = Math.min(85, (rainfall*0.25 + zone.risk*0.3 + 15));
    let chemP = 10 + Math.random()*20;
    let infraP = 15 + Math.random()*25;

    const total = floodP+fireP+landP+chemP+infraP;
    floodP = Math.round(floodP/total*100);
    fireP = Math.round(fireP/total*100);
    landP = Math.round(landP/total*100);
    chemP = Math.round(chemP/total*100);
    infraP = 100-floodP-fireP-landP-chemP;

    const dominant = Math.max(floodP,fireP,landP);
    const domType = dominant===floodP?'Flood':dominant===fireP?'Wildfire':'Landslide';
    const severity = dominant > 50 ? 'CRITICAL' : dominant > 30 ? 'HIGH' : 'MEDIUM';
    const sevColor = dominant > 50 ? 'var(--red)' : dominant > 30 ? 'var(--yellow)' : 'var(--accent2)';

    document.getElementById('pred-output').innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div style="text-align:left">
          <div style="font-family:var(--mono);font-size:11px;color:var(--text3)">PREDICTED DISASTER</div>
          <div style="font-size:22px;font-weight:600;color:var(--text)">${domType}</div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-family:var(--mono);font-size:11px;color:var(--text3)">SEVERITY</div>
          <div style="font-size:18px;font-weight:700;color:${sevColor}">${severity}</div>
        </div>
      </div>
      ${[['Flood',floodP,'#3b82f6'],['Wildfire',fireP,'#f97316'],['Landslide',landP,'#f59e0b'],['Chemical',chemP,'#8b5cf6'],['Infrastructure',infraP,'#14b8a6']].map(([l,v,col])=>`
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;color:var(--text2)">${l}</span>
          <span style="font-family:var(--mono);font-size:12px;color:${col}">${v}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${v}%;background:${col}"></div></div>
      </div>`).join('')}
      <div style="margin-top:12px;padding:10px;background:var(--bg3);border-radius:4px;border:1px solid var(--border)">
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:4px">RECOMMENDED ACTION</div>
        <div style="font-size:12px;color:var(--text2)">${domType==='Flood'?'Deploy water barriers, alert downstream communities, pre-position boats.':domType==='Wildfire'?'Activate firebreaks, deploy aerial support, initiate evacuation zone 2km radius.':'Issue geo-technical advisory, monitor with inclinometers, restrict road access.'}</div>
      </div>`;
    btn.textContent = '▶ RUN PREDICTION';
    btn.disabled = false;
  }, 1200);
}

let logPaused = false;
function startLogs() {
  const stream = document.getElementById('log-stream');
  if(!stream) return;
  const messages = [
    ['[SENSOR] Zone Z001 — rainfall threshold 142mm exceeded',''],
    ['[AI] Flood probability updated: 87% → 89%','warn'],
    ['[API] POST /predict/disaster → 200 OK (187ms)',''],
    ['[SEC] JWT validated for user admin@cep.edu',''],
    ['[QUANTUM] Circuit depth: 18, Qubits: 12, Fidelity: 0.94',''],
    ['[SENSOR] Wind speed alert: 34km/h at Hassan sector 3','warn'],
    ['[RESOURCE] Rescue Team Bravo-12 dispatched to Kodagu',''],
    ['[AI] Model retraining scheduled in 2h',''],
    ['[ALERT] New critical event generated: ALT_FLOOD_DWD','err'],
    ['[API] GET /sensors/stream → 200 OK (5ms)',''],
    ['[SEC] Rate limit: 4823 req/min within quota',''],
    ['[QUANTUM] VQE convergence at iteration 47',''],
    ['[SENSOR] Soil moisture: 87% (threshold: 80%)','warn'],
    ['[RESOURCE] Optimizer: optimal allocation computed (3 teams)',''],
    ['[API] GET /alerts/live → 200 OK (8ms)',''],
  ];
  let i=0;
  logInterval = setInterval(()=>{
    if(logPaused) return;
    const s = document.getElementById('log-stream');
    if(!s) { clearInterval(logInterval); return; }
    const [msg,cls] = messages[i%messages.length];
    const now = new Date().toLocaleTimeString('en-IN');
    const line = document.createElement('div');
    line.className = 'log-line' + (cls?' '+cls:'');
    line.innerHTML = `<span>${now} ${msg}</span>`;
    s.appendChild(line);
    s.scrollTop = s.scrollHeight;
    if(s.children.length > 50) s.removeChild(s.firstChild);
    i++;
  }, 800);
}

function stopLogs() { if(logInterval) clearInterval(logInterval); logInterval=null; logPaused=false; }
function toggleLog() {
  logPaused = !logPaused;
  const btn = document.querySelector('[onclick="toggleLog()"]');
  if(btn) btn.textContent = logPaused ? '▶ Resume' : '⏸ Pause';
}

function validateJWT() {
  const input = document.getElementById('jwt-input').value.trim();
  const result = document.getElementById('jwt-result');
  if(!input) { result.innerHTML='<div style="color:var(--red);font-size:12px;font-family:var(--mono)">✗ Empty token</div>'; return; }
  const parts = input.split('.');
  if(parts.length===3) {
    try {
      const payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
      result.innerHTML=`<div style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.3);border-radius:4px;padding:10px">
        <div style="font-family:var(--mono);font-size:10px;color:var(--green);margin-bottom:8px">✓ VALID JWT STRUCTURE</div>
        <div class="code-block" style="font-size:10px">${JSON.stringify(payload,null,2)}</div>
      </div>`;
    } catch(e) {
      result.innerHTML=`<div style="color:var(--red);font-size:12px;font-family:var(--mono)">✗ Valid structure but payload decode failed</div>`;
    }
  } else {
    result.innerHTML=`<div style="color:var(--red);font-size:12px;font-family:var(--mono)">✗ Invalid JWT format (expected 3 parts, got ${parts.length})</div>`;
  }
}

function drawQuantumCircuit(type) {
  const canvas = document.getElementById('quantum-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const w=canvas.width, h=canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#151e35';
  ctx.fillRect(0,0,w,h);

  const qubits = type==='vqe'?4:type==='qaoa'?5:3;
  const qh = h/(qubits+1);
  const gates = type==='vqe'?
    [{q:0,x:80,t:'H'},{q:1,x:80,t:'H'},{q:2,x:80,t:'H'},{q:3,x:80,t:'H'},
     {q:0,x:150,t:'Ry'},{q:1,x:150,t:'Rz'},{q:2,x:150,t:'Ry'},{q:3,x:150,t:'Rx'},
     {cx:0,cy:1,x:220},{cx:1,cy:2,x:290},{cx:2,cy:3,x:360},
     {q:0,x:430,t:'Ry'},{q:1,x:430,t:'Rz'},{q:2,x:430,t:'Rx'}]:
    type==='qaoa'?
    [{q:0,x:80,t:'H'},{q:1,x:80,t:'H'},{q:2,x:80,t:'H'},{q:3,x:80,t:'H'},{q:4,x:80,t:'H'},
     {cx:0,cy:1,x:150},{cx:2,cy:3,x:150},{cx:1,cy:2,x:220},{cx:3,cy:4,x:220},
     {q:0,x:290,t:'Rz'},{q:1,x:290,t:'Rx'},{q:2,x:290,t:'Rz'},{q:3,x:290,t:'Rx'},{q:4,x:290,t:'Rz'},
     {cx:0,cy:2,x:360},{cx:1,cy:3,x:360},{q:0,x:430,t:'M'},{q:1,x:430,t:'M'}]:
    [{q:0,x:80,t:'H'},{q:1,x:80,t:'H'},{q:2,x:80,t:'H'},
     {q:0,x:150,t:'Rz'},{q:1,x:150,t:'Ry'},{cx:0,cy:1,x:220},
     {q:0,x:290,t:'Rx'},{q:2,x:290,t:'Rz'},{cx:1,cy:2,x:360},{q:0,x:430,t:'M'}];

  // Draw qubit lines
  for(let q=0;q<qubits;q++) {
    const y = (q+1)*qh;
    ctx.strokeStyle='rgba(99,179,237,0.3)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(40,y);
    ctx.lineTo(w-20,y);
    ctx.stroke();
    ctx.fillStyle='#60a5fa';
    ctx.font='bold 11px Space Mono';
    ctx.fillText('q'+q,8,y+4);
  }

  // Draw gates
  gates.forEach(g=>{
    if(g.t!==undefined) {
      const y=(g.q+1)*qh;
      const gateColors={H:'#3b82f6',Ry:'#8b5cf6',Rz:'#14b8a6',Rx:'#f59e0b',M:'#10b981'};
      const col=gateColors[g.t]||'#4a6080';
      ctx.fillStyle=col+'33';
      ctx.strokeStyle=col;
      ctx.lineWidth=1.5;
      roundRect(ctx,g.x-16,y-13,32,26,4);
      ctx.fillStyle=col;
      ctx.font='bold 10px Space Mono';
      ctx.textAlign='center';
      ctx.fillText(g.t,g.x,y+4);
    } else if(g.cx!==undefined) {
      const y1=(g.cx+1)*qh, y2=(g.cy+1)*qh;
      ctx.strokeStyle='rgba(99,179,237,0.7)';
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(g.x,y1);
      ctx.lineTo(g.x,y2);
      ctx.stroke();
      ctx.fillStyle='#60a5fa';
      ctx.beginPath();
      ctx.arc(g.x,y1,5,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle='#60a5fa';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(g.x,y2,8,0,Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(g.x-8,y2);
      ctx.lineTo(g.x+8,y2);
      ctx.moveTo(g.x,y2-8);
      ctx.lineTo(g.x,y2+8);
      ctx.stroke();
    }
  });

  ctx.fillStyle='rgba(99,179,237,0.5)';
  ctx.font='10px Space Mono';
  ctx.textAlign='left';
  ctx.fillText(type.toUpperCase()+' Circuit — Depth: '+(type==='vqe'?18:type==='qaoa'?22:15)+' | Qubits: '+qubits, 40, h-8);
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}
